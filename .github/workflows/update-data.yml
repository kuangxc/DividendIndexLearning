name: Update Dividend Index Data

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 工作日每天北京时间18:00（收盘后，避免数据尚未刷新）
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

concurrency:
  group: dividend-data-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas matplotlib

      - name: Run data update script
        run: |
          python scripts/update_data.py --incremental

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ charts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: $(date +%Y-%m-%d) 估值数据更新 [bot]"
          git pull --rebase origin main
          git push origin main
