name: Update Dividend Index Data

on:
  schedule:
    - cron: '0 16 * * 5'  # 每周五北京时间16:00（收盘后）
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei
          pip install akshare pandas matplotlib

      - name: Run data update script
        env:
          MATPLOTLIBRC_FONT: WenQuanYi Zen Hei
        run: |
          python scripts/update_data.py --incremental

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ charts/
          git diff --cached --quiet || git commit -m "data: $(date +%Y-%m-%d) 估值数据更新 [bot]"
          git push
